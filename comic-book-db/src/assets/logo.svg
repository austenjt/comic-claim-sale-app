<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 230">
  <defs>
    <filter id="shadow" x="-10%" y="-15%" width="125%" height="140%">
      <feDropShadow dx="2" dy="3" stdDeviation="2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- LIGHTNING - yellow -->
  <text
    x="270" y="76"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-style="italic"
    font-size="78"
    fill="#f9d000"
    stroke="#111111"
    stroke-width="7"
    stroke-linejoin="round"
    paint-order="stroke fill"
    filter="url(#shadow)"
  >LIGHTNING</text>

  <!-- COMICS - blue -->
  <text
    x="270" y="158"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-style="italic"
    font-size="94"
    fill="#3a8edc"
    stroke="#111111"
    stroke-width="7"
    stroke-linejoin="round"
    paint-order="stroke fill"
    filter="url(#shadow)"
  >COMICS</text>

  <!-- ROCKS - red -->
  <text
    x="270" y="214"
    text-anchor="middle"
    font-family="Impact, 'Arial Black', Arial, sans-serif"
    font-style="italic"
    font-size="64"
    fill="#cc2222"
    stroke="#111111"
    stroke-width="6"
    stroke-linejoin="round"
    paint-order="stroke fill"
    filter="url(#shadow)"
  >ROCKS</text>
</svg>
