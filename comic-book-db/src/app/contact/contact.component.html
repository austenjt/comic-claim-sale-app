<div class="contact-container">
  <h1>Contact</h1>

  <div class="contact-section">
    <p>Have a question about a listing, want to make an offer, or need help with your order? Send us a message and we'll get back to you within 1–2 business days.</p>
  </div>

  <div *ngIf="sent" class="msg-success">&#10003; Your message has been sent!</div>

  <form *ngIf="!sent" (ngSubmit)="submit()" #contactForm="ngForm" class="contact-form">
    <div class="form-group">
      <label for="name">Name</label>
      <input id="name" type="text" [(ngModel)]="name" name="name" required />
    </div>

    <div class="form-group">
      <label for="email">Email</label>
      <input id="email" type="email" [(ngModel)]="email" name="email" required />
    </div>

    <div class="form-group">
      <label for="message">Message</label>
      <textarea id="message" [(ngModel)]="message" name="message" rows="6" required></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="sending || !contactForm.valid">
        {{ sending ? 'Sending…' : 'Send Message' }}
      </button>
    </div>

    <p *ngIf="sendError" class="msg-error">&#10007; {{ sendError }}</p>
  </form>
</div>
